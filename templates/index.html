<!DOCTYPE html>
<html>
<head>
    <title>AI Content Summarizer</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: white;
            margin: 0;
        }

        /* 🔥 NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #1DB954;
        }

        /* 🔥 MAIN CONTAINER */
        .container {
            width: 60%;
            margin: auto;
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            outline: none;
        }

        button {
            background: #1DB954;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1ed760;
        }

        /* 🔥 LOADING SPINNER */
        .loader {
            display: none;
            margin-top: 20px;
        }

        .loader div {
            width: 15px;
            height: 15px;
            background: #1DB954;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.2s infinite;
        }

        .loader div:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader div:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <div class="logo">🚀 AI Content Summarizer</div>
</div>

<!-- 🔥 MAIN -->
<div class="container">

    <h1>Summarize your content instantly</h1>

    <form action="/summarize" method="post" onsubmit="showLoader()">
        <textarea name="text" placeholder="Paste your content here..."></textarea><br>
        <button type="submit">Summarize</button>
    </form>

    <!-- 🔥 LOADING -->
    <div class="loader" id="loader">
        <div></div>
        <div></div>
        <div></div>
    </div>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
